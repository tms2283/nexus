# /etc/nginx/sites-available/nexus
# Nexus production Nginx configuration
# Symlink: sudo ln -s /etc/nginx/sites-available/nexus /etc/nginx/sites-enabled/
# After editing: sudo nginx -t && sudo systemctl reload nginx

# ─── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=nexus_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=nexus_general:10m rate=60r/m;

# ─── Main app server ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── SSL (Let's Encrypt via Certbot) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Content Security Policy — tightened to prevent XSS via AI-generated markdown
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; media-src 'self' https:; frame-ancestors 'none';" always;

    # ─── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ─── Static files (Vite build output) ────────────────────────────────
    root /var/www/nexus/dist/public;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Audio files (generated MP3s) ────────────────────────────────────
    location /audio/ {
        alias /var/www/nexus/public/audio/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── tRPC API (Node.js app on port 3000) ─────────────────────────────
    location /api/trpc/ {
        limit_req zone=nexus_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ─── OAuth callbacks ─────────────────────────────────────────────────
    location /api/oauth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Research pipeline (Python FastAPI on port 8001) ─────────────────
    # Internal only — NOT exposed to internet. Node.js proxies through it.
    # This block is here only for potential future admin access.
    # location /internal/research/ {
    #     allow 127.0.0.1;
    #     deny all;
    #     proxy_pass http://127.0.0.1:8001/;
    # }

    # ─── SPA fallback (React Router / Wouter) ────────────────────────────
    location / {
        limit_req zone=nexus_general burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
