name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: UTF-8 encoding guard
        run: |
          set -e
          mapfile -t files < <(git ls-files '*.ts' '*.tsx' '*.md' '*.json')
          fail=0
          for f in "${files[@]}"; do
            if ! iconv -f UTF-8 -t UTF-8 "$f" >/dev/null 2>&1; then
              echo "::error file=$f::File is not valid UTF-8"
              fail=1
            fi
          done
          exit $fail

      - name: TypeScript check
        run: pnpm check

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: nexus

  deploy:
    name: Trigger VPS Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          url="${DEPLOY_WEBHOOK_URL:-https://schmo.tech/hooks/deploy-nexus}"
          secret="${DEPLOY_WEBHOOK_SECRET:-}"
          payload='{"ref":"refs/heads/main"}'

          if [ -z "$secret" ]; then
            # Fallback for repos that already keep webhook secret in deploy/hooks.json.
            secret="$(sed -n 's/.*"secret"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' deploy/hooks.json | head -n1)"
            echo "DEPLOY_WEBHOOK_SECRET not set; using secret from deploy/hooks.json fallback."
          fi

          if [ -z "$secret" ]; then
            echo "No webhook secret available from secrets or deploy/hooks.json."
            exit 1
          fi

          sig="$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$secret" -hex | sed 's/^.* //')"

          response="$(curl -sS -w '\n%{http_code}' -X POST "$url" \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature-256: sha256=$sig" \
            --data "$payload")"

          body="$(printf '%s' "$response" | sed '$d')"
          code="$(printf '%s' "$response" | tail -n1)"

          echo "Webhook URL: $url"
          echo "Webhook HTTP status: $code"
          echo "Webhook body: $body"

          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "Webhook deploy trigger failed."
            exit 1
          fi

      - name: Wait for app health
        env:
          APP_HEALTH_URL: ${{ secrets.APP_HEALTH_URL }}
        run: |
          set -euo pipefail

          health_url="${APP_HEALTH_URL:-https://schmo.tech/api/trpc/system.health?input=%7B%7D}"
          echo "Waiting for health URL: $health_url"

          for i in $(seq 1 24); do
            if curl -fsS "$health_url" > /dev/null; then
              echo "Health check passed."
              exit 0
            fi

            echo "Health check pending ($i/24)."
            sleep 10
          done

          echo "Health check did not pass within 4 minutes."
          exit 1
