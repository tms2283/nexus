<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="The training loop: data in, prediction, loss, weight update">
  <defs>
    <linearGradient id="tl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e14"/>
      <stop offset="1" stop-color="#12161f"/>
    </linearGradient>
    <marker id="tl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="tl-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="420" fill="url(#tl-bg)" rx="18"/>
  <text x="450" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">How an AI Model Actually Learns</text>
  <text x="450" y="60" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">One full loop happens billions of times during training</text>

  <!-- 1 Data In -->
  <g transform="translate(60,120)">
    <rect width="170" height="120" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="28" cy="28" r="14" fill="#f59e0b"/>
    <text x="28" y="33" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#0b0e14">1</text>
    <text x="85" y="70" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#fbbf24">DATA IN</text>
    <text x="85" y="92" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">An example with</text>
    <text x="85" y="107" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">a known right answer</text>
  </g>

  <!-- Arrow -->
  <line x1="235" y1="180" x2="275" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#tl-arrow)"/>

  <!-- 2 Prediction -->
  <g transform="translate(285,120)">
    <rect width="170" height="120" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="28" cy="28" r="14" fill="#06b6d4"/>
    <text x="28" y="33" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#0b0e14">2</text>
    <text x="85" y="70" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#67e8f9">PREDICTION</text>
    <text x="85" y="92" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">Model guesses using</text>
    <text x="85" y="107" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">its current weights</text>
  </g>

  <!-- Arrow -->
  <line x1="460" y1="180" x2="500" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#tl-arrow)"/>

  <!-- 3 Loss -->
  <g transform="translate(510,120)">
    <rect width="170" height="120" rx="14" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <circle cx="28" cy="28" r="14" fill="#a855f7"/>
    <text x="28" y="33" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#0b0e14">3</text>
    <text x="85" y="70" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#d8b4fe">LOSS</text>
    <text x="85" y="92" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">How wrong was it?</text>
    <text x="85" y="107" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">A single number.</text>
  </g>

  <!-- Arrow -->
  <line x1="685" y1="180" x2="725" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#tl-arrow)"/>

  <!-- 4 Adjust -->
  <g transform="translate(735,120)">
    <rect width="135" height="120" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <circle cx="28" cy="28" r="14" fill="#22c55e"/>
    <text x="28" y="33" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#0b0e14">4</text>
    <text x="67" y="70" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#86efac">ADJUST</text>
    <text x="67" y="92" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">Nudge every weight</text>
    <text x="67" y="107" text-anchor="middle" font-family="Inter" font-size="11" fill="#cbd5e1">to reduce the loss</text>
  </g>

  <!-- Return loop -->
  <path d="M 802 240 Q 802 310 145 310 Q 145 255 145 240" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#tl-arrow)"/>
  <text x="470" y="303" text-anchor="middle" font-family="Inter" font-size="12" fill="#94a3b8" font-style="italic">Repeat with the next example. Over billions of loops, the weights converge.</text>

  <!-- WHY panel -->
  <g transform="translate(60,340)">
    <rect width="780" height="60" rx="12" fill="#0b0e14" stroke="#334155" stroke-width="1"/>
    <text x="20" y="26" font-family="Inter" font-size="12" font-weight="700" fill="#f59e0b">Why this matters:</text>
    <text x="20" y="46" font-family="Inter" font-size="12" fill="#cbd5e1">A "weight" is just a number on a dial. Training turns billions of dials until the model's guesses match reality. No rules were written — the pattern was <tspan font-style="italic" fill="#e2e8f0">shaped</tspan>.</text>
  </g>
</svg>
